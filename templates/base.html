<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_title }}{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/output.css">
</head>
<body>
    <header class="bg-white border-b border-ink-200">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-primary-600 text-white font-bold">R</span>
                <div>
                    <h1 class="text-lg font-semibold leading-none text-ink-900">{{ app_title }}</h1>
                    <p class="text-xs text-ink-600 mt-0.5">Puskesmas Baruharjo</p>
                </div>
            </div>
            <div class="text-xs text-ink-600">v0.1.0</div>
        </div>
    </header>
    <main class="max-w-7xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
    <footer class="max-w-7xl mx-auto px-6 py-6 text-xs text-ink-400 border-t border-ink-100 mt-12">
        Rekap-In &copy; 2026 - Internal tool
    </footer>
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>
    <script src="/static/js/format.js"></script>
    <script src="/static/js/app.js" defer></script>
</body>
</html>
